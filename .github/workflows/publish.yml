# Publish the `markstay` crate to crates.io via Trusted Publishing (OIDC, no
# stored token). Mirrors the PyPI mirror's publish.yml.
#
# One-time setup (in the crates.io web UI, as the persona `markstaymd`):
#   crates.io -> the `markstay` crate -> Settings -> Trusted Publishing ->
#   add a GitHub Actions publisher:
#     repository owner: markstaymd
#     repository name:  markstay-rs
#     workflow:         publish.yml
#     environment:      release
#   And in this repo: Settings -> Environments -> create `release`.
# (Trusted Publishing needs the crate to already exist, which it does since
# 0.1.0; there is no PyPI-style pending-publisher for a brand-new crate name.)
#
# Release flow: bump the version in Cargo.toml (re-sync the mirror from the
# umbrella impl/rs first), commit, then cut a GitHub Release with tag vX.Y.Z.
# The job runs the conformance + unit suite, then publishes via OIDC. A version
# that already exists on crates.io will be rejected, so always bump first.

name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo test --all-targets
      - run: cargo clippy --all-targets -- -D warnings

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # required for OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - name: Publish to crates.io
        run: cargo publish --token ${{ steps.auth.outputs.token }}
